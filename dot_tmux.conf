# To avoid conflicts with VIM
set -s escape-time 0
set -g base-index 1
# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
unbind '"'
unbind %

bind-key -n Home send Escape "OH"
bind-key -n End send Escape "OF"

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# switch panes using Alt-arrow without prefix
bind  h select-pane -L
bind  l select-pane -R
bind  k select-pane -U
bind  j select-pane -D

bind-key "S" run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/session.sh switch"
bind-key "C-c" run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/session.sh kill"

# Floating "scratch" terminal: prefix + g toggles a popup attached to a
# persistent `scratch` session, started in the current pane's cwd.
bind-key g display-popup -E -d "#{pane_current_path}" -w 80% -h 80% \
    -T " scratch " "tmux new-session -A -s scratch"

# Copy Mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

# Window naming: ignore OSC title escapes from apps (otherwise tmux renames
# the window to whatever Claude/nvim/etc set as the terminal title), and
# auto-derive the name from just the running command — short and stable.
set -g allow-rename off
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# True color: tmux-256color is what modern tmux + ghostty want; keep the Tc cap for RGB.
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc,*-256color:Tc"

# Clipboard: ghostty supports OSC52; this lets tmux push selections to the
# system clipboard through the terminal, no helper required.
set -s set-clipboard on

# Status bar room: catppuccin's colored escape sequences eat into these
# limits, so bump them or the right side gets truncated.
set -g status-left-length  100
set -g status-right-length 200

# ─── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'jabirali/tmux-tilish'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'catppuccin/tmux'

# ─── Plugin options ────────────────────────────────────────────────────────────
set -g @tilish-default 'main-vertical'

# resurrect / continuum
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'

# thumbs
set -g @thumbs-key f

# sessionx — replaces the old `tms` popup. prefix + C-o.
set -g @sessionx-bind 'C-o'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-window-mode 'on'
set -g @sessionx-filter-current 'false'

# ─── Catppuccin (v2 module system) ─────────────────────────────────────────────
set -g @catppuccin_flavor  'frappe'   # latte | frappe | macchiato | mocha (v2 uses US spelling)

# Window list look: "rounded" gives a pill (catppuccin owns the separator
# strings when status_style is rounded).
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_text         " #{pane_current_command} #(~/.local/bin/tmux-abbrev-path '#{pane_current_path}')"
set -g @catppuccin_window_current_text " #{pane_current_command} #(~/.local/bin/tmux-abbrev-path '#{pane_current_path}')#{?window_zoomed_flag,(),}"

# status line shape — rounded ends, full-color fill, disconnected modules.
# Gives each module breathing room instead of the cramped "space" default.
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# module text overrides
# Note: leading space in *_text is the catppuccin convention — it pairs
# with the trailing space in each module's *_icon to keep one visible gap
# between glyph and label. Drop the leading space and the text touches the icon.
set -g @catppuccin_directory_text " #{b:pane_current_path}"
set -g @catppuccin_date_time_text " %Y-%m-%d %I:%M %p"

# Blend module text-backgrounds with the status bar. By default catppuccin
# uses surface_1 for the text portion of each module, which sits slightly
# darker than the bar background and reads as a visible "tile". Setting both
# to "default" lets them inherit the terminal background, so the only colored
# pixels are the icon squares.
set -g @catppuccin_status_background      "default"
set -g @catppuccin_status_module_bg_color "default"

# Per-module accent colors (matching catppuccin v2 defaults; set explicitly
# because relying on `set -ogq` defaults after an unset proved unreliable).
set -g @catppuccin_application_color "#{@thm_red}"
set -g @catppuccin_session_color     "#{@thm_green}"
set -g @catppuccin_directory_color   "#{@thm_peach}"
set -g @catppuccin_date_time_color   "#{@thm_blue}"
set -g @catppuccin_battery_color     "#{@thm_pink}"

# ─── Init TPM (keep near the bottom) ───────────────────────────────────────────
# Bootstrap TPM on fresh machines (mirrors zinit's self-install in .zshrc),
# then install any missing plugins so a new box works on first launch.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'

# Alt-h / Alt-l: smart horizontal nav. Move to the pane on the left/right;
# at the edge of the layout, fall through to previous/next window.
# Must come AFTER tpm so this wins over tilish's own M-h/M-l bindings.
bind-key -n M-h     if-shell -F '#{pane_at_left}'  'previous-window' 'select-pane -L'
bind-key -n M-l     if-shell -F '#{pane_at_right}' 'next-window'     'select-pane -R'
bind-key -n M-Left  if-shell -F '#{pane_at_left}'  'previous-window' 'select-pane -L'
bind-key -n M-Right if-shell -F '#{pane_at_right}' 'next-window'     'select-pane -R'

# ─── Status line (after Catppuccin is loaded by TPM) ───────────────────────────
# Extra leading spaces are deliberate: the rounded glyphs overflow their cell
# and visually swallow single-space gaps, so we pad explicitly.
set -g status-left ""
set -g status-right ""
set -ag status-right "#{E:@catppuccin_status_application}"
set -ag status-right "  #{E:@catppuccin_status_session}"
set -ag status-right "  #{E:@catppuccin_status_directory}"
# Custom battery block: tmux-battery's #{battery_*} placeholders are only
# substituted inside status-right at plugin load, not inside nested option
# values, so catppuccin's battery module renders empty. Call the scripts
# directly via #(...) instead — same look, no plugin glue needed.
set -ag status-right "  #[fg=#{@thm_lavender},bg=default]#[fg=#{@thm_crust},bg=#{@thm_lavender}] #(~/.tmux/plugins/tmux-battery/scripts/battery_icon.sh) #[fg=#{@thm_fg},bg=default] #(~/.tmux/plugins/tmux-battery/scripts/battery_percentage.sh)#[fg=default,bg=default]"
set -ag status-right "  #{E:@catppuccin_status_date_time}"
