general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple. hyprlock now renders the input field on every monitor, so no active-monitor wrapper is needed.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms("on")'  # wake displays on resume. NOTE: bare `dispatch dpms on` silently fails on this Lua-config Hyprland (hl.dispatch needs a dispatcher object).
}

listener {
    timeout = 150                                # 2.5min.
    on-timeout = brightnessctl -s set 10         # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -r                 # monitor backlight restore.
}

# turn off keyboard backlight, comment out this section if you dont have a keyboard backlight.
listener {
    timeout = 150                                          # 2.5min.
    on-timeout = brightnessctl -sd rgb:kbd_backlight set 0 # turn off keyboard backlight.
    on-resume = brightnessctl -rd rgb:kbd_backlight        # turn on keyboard backlight.
}

listener {
    timeout = 300                                 # 5min
    on-timeout = loginctl lock-session            # lock screen when timeout has passed
}

listener {
    timeout = 330                                                     # 5.5min
    on-timeout = hyprctl dispatch 'hl.dsp.dpms("off")'                # screen off when timeout has passed
    on-resume = hyprctl dispatch 'hl.dsp.dpms("on")' && brightnessctl -r   # screen on when activity is detected after timeout has fired.
}

listener {
    timeout = 1800                                # 30min
    on-timeout = systemctl suspend                 # suspend (undocked: ~90% hardware sleep; docked: no-op via clamshell)
}

# desky presence: tell the desk daemon you've left so an empty chair at sitting
# height stops accruing sit time / firing "you've been sitting N min" nudges.
# 600s (10min) is a balance — long enough that brief reading pauses don't trip
# it, short enough to catch a real departure well before the 45min sit nudge.
# Absolute path: hypridle's PATH may not include ~/.local/bin. Both commands are
# no-ops if the daemon is down, so this never errors.
listener {
    timeout = 600                                      # 10min away from input
    on-timeout = /home/cooper/.local/bin/desky presence away    # left the desk
    on-resume = /home/cooper/.local/bin/desky presence active   # came back
}
