# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
# Bridge west's hand-written fish completion into carapace, so nushell (carapace
# external completer) gets full west completion WITH descriptions. fish is chosen
# over bash because west's fish completion carries per-item descriptions (bash is
# value-only) and carapace's fish bridge is more robust than its bash one. west is
# not argcomplete/cobra/etc., so a generic shell bridge is required.
# parsing: disabled = carapace forwards the raw line to fish's completion instead of
# parsing west's args itself (required for a pure bridge).
# Prereqs — the bridge runs fish sandboxed (fish --no-config) and does NOT see
# ~/.config/fish/completions on its own:
#   1. west completion fish > ~/.config/carapace/bridge/fish/completions/west.fish
#   2. ~/.config/carapace/bridge/fish/config.fish must put that dir on
#      fish_complete_path (fish 4.8 made __fish_config_dir read-only, which broke
#      carapace <=1.7.3's own sandbox-dir mechanism; the config.fish hook still works).
name: west
description: Zephyr meta-tool
parsing: disabled
completion:
  positionalany: ["$carapace.bridge.Fish([west])"]
